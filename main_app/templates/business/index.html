<h2>{{ object.company_name }}</h2>

<h3>Selected Services</h3>
{% for service in object.services.all %}
    <p>
        {{ service.title }}
        <a href="{% url 'remove_service' object.id service.id %}">Remove</a>
    </p>
{% endfor %}

<hr>

<h3>Available Services</h3>
{% for service in services %}
    <p>
        {{ service.title }}
        <a href="{% url 'add_service' object.id service.id %}">Add</a>
    </p>
{% endfor %}
