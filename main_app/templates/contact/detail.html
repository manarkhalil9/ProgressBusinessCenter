{% extends 'base.html' %}
{% load i18n %}

{% block content %}


<section class="page-header">

<h1>
{% trans "Contact Us" %}
</h1>

<p>
{% trans "Get in touch with Progress Business Centre." %}
</p>


</section>



<section class="detail-card">


<p>
<strong>{% trans "Phone:" %}</strong>
{{ contact.phone }}

<a href="https://wa.me/{{ contact.whatsapp }}">
{{ contact.whatsapp }}

</p>


<p>

{{ contact.email }}
</p>

{% endblock %}
