{% extends 'base.html' %}

{% block content %}

<h1>Contact Us</h1>

<p>
    <strong>Phone:</strong>
    {{ contact.phone }}
</p>

<p>
    <strong>WhatsApp:</strong>
    <a href="https://wa.me/{{ contact.whatsapp }}">
        {{ contact.whatsapp }}
    </a>
</p>

<p>
    <strong>Email:</strong>
    {{ contact.email }}
</p>

<p>
    <strong>Address:</strong>
    {{ contact.address }}
</p>

<p>
    <strong>Google Maps:</strong>
    <a href="{{ contact.google_map }}" target="_blank">
        View Location
    </a>
</p>

{% endblock %}
