{% extends "base.html" %}

{% block content %}

<section class="page-header">

<h1>Gallery</h1>

</section>

<section class="gallery-grid">

{% for image in gallery %}

<a href="{% url 'gallery_detail' image.id %}" class="gallery-card">

<img src="{{ image.image.url }}">

<h3>{{ image.title }}</h3>

</a>

{% endfor %}

</section>

{% endblock %}
