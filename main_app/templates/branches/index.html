{% extends 'base.html' %}

{% block content %}

<h1>Branches</h1>

<a href="{% url 'branch_create' %}">Create Branch</a>

<hr>

{% for branch in branches %}

<h2>

<a href="{% url 'branch_detail' branch.pk %}">

{{ branch.name }}

</a>

</h2>

<p>{{ branch.address }}</p>

<hr>

{% empty %}

<p>No branches found.</p>

{% endfor %}

{% endblock %}
