{% extends 'base.html' %}
{% load i18n %}

{% block content %}


<section class="page-header">

<h1>{% trans "Our Locations" %}</h1>

<p>
{% trans "Explore our business centers and available branches." %}
</p>

</section>


<section class="features-section">

<div class="card-grid">

{% for branch in branches %}

<div class="feature-card">

<h3>📍 {{ branch.name }}</h3>

<p>
{{ branch.address }}
</p>

<a class="btn" href="{% url 'branch_detail' branch.id %}">
{% trans "View Branch" %}
</a>

</div>

{% endfor %}

</div>

</section>


{% endblock %}
