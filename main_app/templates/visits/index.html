{% extends 'base.html' %}

{% block content %}

<h1>Visit Requests</h1>

{% for visit in visits %}

<div>
    <h3>{{ visit.full_name }}</h3>
    <p>{{ visit.email }}</p>
    <p>{{ visit.phone }}</p>
    <p>{{ visit.preferred_date }} - {{ visit.preferred_time }}</p>
</div>

<hr>

{% endfor %}

{% endblock %}
