{% extends 'base.html' %}

{% block content %}


<section class="page-header">

<h1>Events & Programs</h1>

<p>
Join our business events and networking programs.
</p>

</section>



<section class="features-section">

<div class="card-grid">


{% for event in events %}


<div class="service-card">


<h3>
{{ event.title }}
</h3>


<p>
{{ event.event_date }}
</p>


<a class="btn" href="{% url 'event_detail' event.id %}">
View Event
</a>


</div>


{% endfor %}


</div>

</section>


{% endblock %}
