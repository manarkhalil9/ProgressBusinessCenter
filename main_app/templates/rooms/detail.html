{% extends 'base.html' %}
{% load i18n %}

{% block content %}

<section class="page-header">

<h1>{% trans "Meeting Rooms" %}</h1>

</section>

<section class="card-grid">

{% for room in rooms %}

<div class="service-card">

<h2>{{ room.name }}</h2>

<p>{% trans "Capacity:" %} {{ room.capacity }}</p>

<p>$ {{ room.price_per_hour }}</p>

<a class="btn"
href="{% url 'room_detail' room.id %}">
{% trans "View Room" %}
</a>

</div>

{% endfor %}

</section>

{% endblock %}
