{% extends 'base.html' %}
{% block content %}

<h1>Meeting Rooms</h1>

{% for room in rooms %}
    <h3>{{ room.name }}</h3>
    <p>Capacity: {{ room.capacity }}</p>
    <p>Price: {{ room.price_per_hour }}</p>
    <a href="{% url 'room_detail' room.id %}">View</a>
    <hr>
{% endfor %}

{% endblock %}
