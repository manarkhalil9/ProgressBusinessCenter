{% extends 'base.html' %}

{% block content %}

<h1>Meeting Rooms</h1>

<a href="{% url 'room_create' %}">Create Room</a>

<hr>

{% for room in rooms %}

<h2>

<a href="{% url 'room_detail' room.pk %}">

{{ room.name }}

</a>

</h2>

<p>Capacity: {{ room.capacity }}</p>

<p>Price: {{ room.price_per_hour }}</p>

<hr>

{% empty %}

<p>No rooms available.</p>

{% endfor %}

{% endblock %}
