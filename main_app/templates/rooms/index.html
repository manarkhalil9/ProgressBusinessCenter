{% extends 'base.html' %}

{% block content %}

<h1>Meeting Rooms</h1>

{% for room in rooms %}

<div>
    <h2>{{ room.name }}</h2>
    <p>Capacity: {{ room.capacity }}</p>
    <p>Price: {{ room.price_per_hour }}</p>
    <p>Available: {{ room.available }}</p>
</div>

<hr>

{% endfor %}

{% endblock %}
