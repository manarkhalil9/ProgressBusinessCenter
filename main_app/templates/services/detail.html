{% extends 'base.html' %}
{% block content %}

<section class="detail-card">

<h1>{{ service.title }}</h1>

<p>{{ service.description }}</p>

<p>

<strong>Status:</strong>

{% if service.available %}

<span class="available">
Available
</span>

{% else %}

<span class="not-available">
Not Available
</span>

{% endif %}

</p>

</section>

{% endblock %}
