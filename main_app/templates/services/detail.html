{% extends 'base.html' %}
{% load i18n %}

{% block content %}

<section class="detail-card">

<h1>{{ service.title }}</h1>

<p>{{ service.description }}</p>

<p>

<strong>{% trans "Status:" %}</strong>

{% if service.available %}

<span class="available">
{% trans "Available" %}
</span>

{% else %}

<span class="not-available">
{% trans "Not Available" %}
</span>

{% endif %}

</p>

</section>

{% endblock %}
