{% extends 'base.html' %}

{% block content %}

<h1>Services</h1>

<a href="{% url 'service_create' %}">Create Service</a>

<hr>

{% for service in services %}

<div>

<h2>
<a href="{% url 'service_detail' service.pk %}">
{{ service.title }}
</a>
</h2>

<p>{{ service.description }}</p>

</div>

<hr>

{% empty %}

<p>No services available.</p>

{% endfor %}

{% endblock %}
