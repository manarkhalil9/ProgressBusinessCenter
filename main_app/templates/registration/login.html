{% extends 'base.html' %}
{% load i18n %}

{% block content %}

<section class="form-card">


<h1>
{% trans "Login" %}
</h1>


<form method="post">

{% csrf_token %}

{{ form.as_p }}


<button class="btn" type="submit">
{% trans "Login" %}
</button>


</form>



<p>
{% trans "Don't have an account?" %}

<a href="{% url 'signup' %}">
{% trans "Sign up" %}
</a>

</p>


</section>


{% endblock %}
